<!doctype html>
<html><head><meta charset="utf-8">
<title>Cassandra's Business Card — FRONT</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@page{size:3.5in 2in;margin:0}
body{background:#333;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Jost',sans-serif}
.card{width:1050px;height:600px;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 70% 80% at 72% 18%,#211d16,#0c0c0e 62%);
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
  display:flex;align-items:center;justify-content:center}
.frame{position:absolute;inset:16px;border:1.5px solid rgba(216,176,104,.5);pointer-events:none;z-index:5}
.card img{max-width:82%;max-height:84%;object-fit:contain;mix-blend-mode:screen}
@media print{
  body{background:#fff;display:block;min-height:0}
  .card{position:fixed;top:0;left:0;transform:scale(.32);transform-origin:top left}
}
</style></head>
<body>
<div class="card">
  <div class="frame"></div>
  <img src="https://img1.wsimg.com/isteam/ip/facedfd9-1ae8-40a4-b935-2f7fda9affc3/1000065386.JPG/:/rs=h:900">
</div>
</body></html>
